services:
  composepulse:
    image: "${COMPOSEPULSE_IMAGE:-changjo/composepulse:latest}"
    container_name: composepulse
    user: "0:0"
    environment:
      ADMIN_USERNAME: "${ADMIN_USERNAME}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      DIUN_WEBHOOK_SECRET: "${DIUN_WEBHOOK_SECRET:?DIUN_WEBHOOK_SECRET is required}"
      WEBHOOK_CONFIG_SHOW_SECRET: "${WEBHOOK_CONFIG_SHOW_SECRET:-}"
      DB_PATH: /data/app.db
      CONTAINER_ROOT: /share/Container
      PORT: "8087"
      COOLDOWN_SECONDS: "${COOLDOWN_SECONDS:-}"
      SESSION_TTL_SECONDS: "${SESSION_TTL_SECONDS:-}"
      REMEMBER_ME_TTL_SECONDS: "${REMEMBER_ME_TTL_SECONDS:-}"
      API_TIMEOUT_SECONDS: "${API_TIMEOUT_SECONDS:-}"
      SSE_MAX_CONNECTIONS: "${SSE_MAX_CONNECTIONS:-}"
      DASHBOARD_SSE_MAX_CONNECTIONS: "${DASHBOARD_SSE_MAX_CONNECTIONS:-}"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-}"
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: "${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-}"
      LOGIN_RATE_LIMIT_LOCK_SECONDS: "${LOGIN_RATE_LIMIT_LOCK_SECONDS:-}"
      PULL_RETRY_MAX_ATTEMPTS: "${PULL_RETRY_MAX_ATTEMPTS:-}"
      PULL_RETRY_DELAY_SECONDS: "${PULL_RETRY_DELAY_SECONDS:-}"
      AUTO_UPDATE_WINDOW_START_HOUR: "${AUTO_UPDATE_WINDOW_START_HOUR:-}"
      AUTO_UPDATE_WINDOW_END_HOUR: "${AUTO_UPDATE_WINDOW_END_HOUR:-}"
      WEB_PUSH_ENABLED: "${WEB_PUSH_ENABLED:-}"
      WEB_PUSH_VAPID_PUBLIC_KEY: "${WEB_PUSH_VAPID_PUBLIC_KEY:-}"
      WEB_PUSH_VAPID_PRIVATE_KEY: "${WEB_PUSH_VAPID_PRIVATE_KEY:-}"
      WEB_PUSH_SUBJECT: "${WEB_PUSH_SUBJECT:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /share/Container:/share/Container:ro
      - ${APP_DATA_BIND_DIR}:/data
    restart: unless-stopped
    ports:
      - "8087:8087"
