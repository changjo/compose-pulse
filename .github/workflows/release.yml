name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run prepublish checks
        run: ./scripts/prepublish_check.sh

      - name: Run Dockerized Go tests
        run: |
          docker run --rm -v "$PWD":/src -w /src golang:1.22-alpine sh -lc \
            'apk add --no-cache build-base >/dev/null && CGO_ENABLED=1 /usr/local/go/bin/go test ./...'

  publish:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Resolve Docker Hub image name
        id: image
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${DOCKERHUB_USERNAME:-}" ]]; then
            echo "Missing repository variable: DOCKERHUB_USERNAME" >&2
            exit 1
          fi
          if [[ -z "${DOCKERHUB_TOKEN:-}" ]]; then
            echo "Missing repository secret: DOCKERHUB_TOKEN" >&2
            exit 1
          fi

          namespace="${DOCKERHUB_NAMESPACE:-$DOCKERHUB_USERNAME}"
          image_name="${DOCKERHUB_IMAGE_NAME:-${GITHUB_REPOSITORY##*/}}"
          image="docker.io/${namespace,,}/${image_name,,}"

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Using Docker image ${image}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image }}
          flavor: |
            latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern=v{{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=ComposePulse
            org.opencontainers.image.description=Safe self-hosted Docker Compose updater with selective DIUN-triggered auto updates
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          args=(release create "$GITHUB_REF_NAME" --verify-tag --generate-notes)
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
